<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Checkout Billing{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    /* Subtle entry animation for HTMX swaps */
    .htmx-swapping { opacity: 0; transition: opacity 120ms ease-out; }
    .htmx-settling { opacity: 1; transition: opacity 200ms ease-in; }
    @media print {
      header, footer, nav, .no-print { display: none !important; }
      body { background: white !important; }
    }
  </style>
</head>
<body class="min-h-screen text-slate-900 bg-gradient-to-br from-slate-50 via-white to-indigo-50">
  <header class="bg-white/80 backdrop-blur border-b border-slate-200 sticky top-0 z-10 no-print">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 text-xl font-semibold text-slate-900 hover:text-indigo-600 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
        </svg>
        Checkout Billing
      </a>
      <span class="hidden sm:inline text-sm text-slate-500">Cart &middot; Offer &middot; Tax &middot; Final Bill</span>
    </div>
  </header>
  <main class="max-w-5xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>
  <footer class="max-w-5xl mx-auto px-6 py-6 text-xs text-slate-400 no-print">
    Built with FastAPI &middot; Jinja &middot; HTMX &middot; Tailwind
  </footer>
</body>
</html>
