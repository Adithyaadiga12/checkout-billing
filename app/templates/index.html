{% extends "base.html" %}
{% block title %}Cart &middot; Checkout Billing{% endblock %}
{% block content %}
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
  <section class="bg-white rounded-lg shadow-sm border border-slate-200 p-6">
    <h2 class="text-lg font-semibold mb-4">Add item</h2>
    <form hx-post="/items"
          hx-target="#cart-region"
          hx-swap="outerHTML"
          hx-on::after-request="if(event.detail.successful) this.reset()"
          class="space-y-3">
      <div>
        <label class="block text-sm font-medium text-slate-700">Name</label>
        <input name="name" required maxlength="80"
               class="mt-1 w-full rounded border border-slate-300 px-3 py-2 focus:border-indigo-500 focus:ring focus:ring-indigo-100"
               placeholder="e.g. Notebook" />
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-slate-700">Price ({{ config.currency_symbol }})</label>
          <input name="price" type="number" step="0.01" min="0.01" required
                 class="mt-1 w-full rounded border border-slate-300 px-3 py-2 focus:border-indigo-500 focus:ring focus:ring-indigo-100" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700">Quantity</label>
          <input name="quantity" type="number" min="1" step="1" required value="1"
                 class="mt-1 w-full rounded border border-slate-300 px-3 py-2 focus:border-indigo-500 focus:ring focus:ring-indigo-100" />
        </div>
      </div>
      <button type="submit"
              class="w-full bg-indigo-600 text-white rounded px-4 py-2 font-medium hover:bg-indigo-700">
        Add to cart
      </button>
    </form>

    <div class="mt-6 text-sm text-slate-500 space-y-1">
      <p><span class="font-medium text-slate-700">Offer:</span> {{ config.offer.name }}</p>
      <p><span class="font-medium text-slate-700">Tax:</span> {{ config.tax.name }} @ {{ config.tax.percent }}%</p>
    </div>
  </section>

  {% include "partials/cart.html" %}
</div>
{% endblock %}
